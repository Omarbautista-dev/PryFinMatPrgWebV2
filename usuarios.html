<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mantenimiento de Usuarios</title>

        <link rel="stylesheet" href="css/menu.css" />
        <link rel="stylesheet" href="css/usuarios.css" />
    </head>

    <body>
        <!-- MENU -->
        <div id="menu-container"></div>

        <div class="container">
            <div class="usuarios-box">
                <h1>Usuarios</h1>

                <form action="#" method="post">
                    <div class="form-contenido">
                        <!-- INPUTS -->
                        <div class="inputs">
                            <label>Nombre de usuario:</label>

                            <select
                                id="cNombre"
                                name="name-user"
                                required
                            ></select>

                            <label>Login de usuario:</label>
                            <input type="text" name="name-login" required />

                            <label>Contraseña del usuario:</label>
                            <input type="password" name="password" required />

                            <label>Fecha de Inicio</label>
                            <input type="date" name="FecIni" required />

                            <label>Fecha de Termino</label>
                            <input type="date" name="FecFin" required />

                            <div class="checkbox-group">
                                <label>Estado de cuenta</label>
                                <input type="checkbox" />
                            </div>
                        </div>

                        <!-- BOTONES -->
                        <div class="botones-usuarios">
                            <button type="submit" class="btn primary">
                                Nuevo
                            </button>

                            <button type="button" class="btn secondary">
                                Borrar
                            </button>

                            <button type="submit" class="btn primary">
                                Modificar
                            </button>

                            <button type="reset" class="btn secondary">
                                Cancelar
                            </button>

                            <button type="submit" class="btn primary">
                                Consultar
                            </button>

                            <button type="button" class="btn danger">
                                Salir
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <script src="js/auth.js"></script>
        <script src="js/menu.js"></script>
        <script src="js/dashboard.js"></script>
        <script src="js/cNombreCompleto.js"></script>
        <script>
            verificarSesion();
        </script>
    </body>
</html>
