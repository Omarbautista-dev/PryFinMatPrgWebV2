<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Cancino Bike | Cambio de Contraseña</title>

        <!-- FUENTE -->
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="css/menu.css" />
        <link rel="stylesheet" href="css/cmbPwd.css" />
    </head>

    <body>
        <!-- MENU -->
        <div id="menu-container"></div>

        <!-- CONTENIDO -->
        <main class="main-content">
            <section class="password-section">
                <!-- PANEL IZQUIERDO -->
                <div class="info-panel">
                    <span class="badge">Seguridad del Sistema</span>

                    <h1>Cambio de Contraseña</h1>

                    <p>
                        Mantén protegida tu cuenta actualizando periódicamente
                        tu contraseña de acceso al sistema de Cancino Bike.
                    </p>

                    <div class="security-cards">
                        <div class="security-item">
                            <span>🔒</span>
                            <p>Protección de datos</p>
                        </div>

                        <div class="security-item">
                            <span>🛡️</span>
                            <p>Acceso seguro</p>
                        </div>

                        <div class="security-item">
                            <span>⚙️</span>
                            <p>Control administrativo</p>
                        </div>
                    </div>
                </div>

                <!-- FORMULARIO -->
                <div class="form-panel">
                    <div class="form-box">
                        <h2>Actualizar Password</h2>

                        <p class="subtitle">Ingresa la información requerida</p>

                        <!-- ALERTA -->
                        <div id="alertaTop" class="alerta">
                            <span id="mensajeAlerta"></span>

                            <button type="button" id="btnAceptar">
                                Aceptar
                            </button>
                        </div>

                        <form id="formCmbPssw">
                            <!-- PASSWORD ACTUAL -->
                            <label>Contraseña actual</label>

                            <div class="input-container">
                                <input
                                    type="password"
                                    name="pssw_ant"
                                    id="pssw_ant"
                                    placeholder="Ingrese contraseña actual"
                                />

                                <span class="togglePassword">👁</span>
                            </div>

                            <small class="error-msg" id="errorAnt"></small>

                            <!-- NUEVA -->
                            <label>Nueva contraseña</label>

                            <div class="input-container">
                                <input
                                    type="password"
                                    name="pssw_new"
                                    id="pssw_new"
                                    placeholder="Ingrese nueva contraseña"
                                />

                                <span class="togglePassword">👁</span>
                            </div>

                            <small class="error-msg" id="errorNew"></small>

                            <!-- CONFIRMAR -->
                            <label>Confirmar contraseña</label>

                            <div class="input-container">
                                <input
                                    type="password"
                                    name="pssw_confirm"
                                    id="pssw_confirm"
                                    placeholder="Confirme contraseña"
                                />

                                <span class="togglePassword">👁</span>
                            </div>

                            <small class="error-msg" id="errorConfirm"></small>

                            <!-- BOTONES -->
                            <div class="botones">
                                <button
                                    type="submit"
                                    class="btn primary"
                                    disabled
                                >
                                    Guardar Cambios
                                </button>

                                <button type="reset" class="btn secondary">
                                    Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </main>

        <script src="/js/auth.js"></script>
        <script src="js/menu.js"></script>
        <script src="js/dashboard.js"></script>
        <script src="js/cmbPwd.js"></script>

        <script>
            verificarSesion();
        </script>
    </body>
</html>
